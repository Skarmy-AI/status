# Upptime config — https://upptime.js.org/docs/configuration
owner: Skarmy-AI
repo: status

sites:
  - name: Skarmy Website
    url: https://www.skarmy.ai
  - name: Skarmy oEmbed API
    url: https://www.skarmy.ai/oembed?url=https%3A%2F%2Fwww.skarmy.ai%2F&format=json

status-website:
  cname: status.skarmy.ai
  name: Skarmy Status
  logoUrl: https://raw.githubusercontent.com/Skarmy-AI/status/HEAD/assets/ball-192.png
  favicon: https://raw.githubusercontent.com/Skarmy-AI/status/HEAD/assets/ball-192.png
  theme: dark
  introTitle: "Is Skarmy down?"
  introMessage: "Live status for [skarmy.ai](https://www.skarmy.ai). The Skarmy website and API are checked **every 5 minutes**; if anything is down, an incident appears here within minutes, with full uptime and response-time history below."
  navbar:
    - title: Status
      href: /
    - title: skarmy.ai
      href: https://www.skarmy.ai
  metaTags:
    - name: description
      content: "Is Skarmy down? Live uptime status for skarmy.ai — website and API availability, incident history, and response times, checked every 5 minutes."
    - name: robots
      content: "index, follow"
    - name: twitter:card
      content: summary
    - name: twitter:site
      content: "@skarmyai"
  customHeadHtml: |
    <link rel="canonical" href="https://status.skarmy.ai/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Skarmy" />
    <meta property="og:url" content="https://status.skarmy.ai/" />
    <meta property="og:title" content="Skarmy Status — live uptime for skarmy.ai" />
    <meta property="og:description" content="Is Skarmy down? Live uptime status for skarmy.ai — website and API availability, incident history, and response times, checked every 5 minutes." />
    <meta property="og:image" content="https://raw.githubusercontent.com/Skarmy-AI/status/HEAD/assets/ball-512.png" />
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebPage","@id":"https://status.skarmy.ai/","url":"https://status.skarmy.ai/","name":"Skarmy Status","description":"Live uptime status for skarmy.ai — website and API availability, incident history, and response times, checked every 5 minutes.","about":{"@type":"Organization","name":"Skarmy","url":"https://www.skarmy.ai","logo":"https://www.skarmy.ai/assets/skarmy-logo.png","sameAs":["https://x.com/skarmyai"]},"isPartOf":{"@type":"WebSite","name":"Skarmy","url":"https://www.skarmy.ai"}}</script>
  css: |
    :root {
      --body-background-color: #0b0a12;
      --body-text-color: #eceaf6;
      --card-background-color: #161320;
      --nav-background-color: #0e0c16;
      --nav-border-bottom-color: #231e33;
      --nav-current-border-bottom-color: #a855f7;
      --card-border-color: #262038;
      --down-border-left-color: #ff3b6b;
      --down-background-color: #2a0f1a;
      --degraded-border-left-color: #f7b731;
      --up-border-left-color: #2dd4a8;
      --tag-color: #07120e;
      --tag-up-background-color: #2dd4a8;
      --tag-down-background-color: #ff3b6b;
      --tag-degraded-background-color: #f7b731;
      --change-background-color: #f7b731;
      --error-button-border-color: #7c3aed;
      --error-button-background-color: #8b5cf6;
      --error-button-color: #ffffff;
      --submit-button-border-color: #7c3aed;
      --submit-button-background-color: #8b5cf6;
      --submit-button-color: #ffffff;
      --graph-opacity: 0.9;
      --graph-filter: none;
    }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background-image:
        radial-gradient(1100px 480px at 82% -12%, rgba(124, 58, 237, 0.20), transparent 60%),
        radial-gradient(900px 420px at 8% -14%, rgba(255, 45, 120, 0.14), transparent 60%);
      background-repeat: no-repeat;
    }
    h1 {
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(92deg, #ff5db1 0%, #a78bfa 48%, #22d3ee 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
    }
    h2, h3 { letter-spacing: -0.01em; }
    .lead { opacity: 0.82; max-width: 46rem; }
    nav {
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--nav-border-bottom-color);
    }
    nav img { border-radius: 50%; }
    article {
      border-radius: 14px;
      border: 1px solid var(--card-border-color);
      border-left-width: 4px;
      box-shadow: 0 6px 28px rgba(0, 0, 0, 0.35);
    }
    .tag { border-radius: 999px; font-weight: 600; }
    a { color: #a78bfa; }
    a:hover { color: #c4b5fd; }
    footer { opacity: 0.6; }
